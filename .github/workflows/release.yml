name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release (e.g. 2.0.0)
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      # TODO: Add NPM_TOKEN to repository secrets, then uncomment:
      # - run: pnpm -r publish --no-git-checks
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish (placeholder)
        run: echo "Publish step — configure NPM_TOKEN secret and uncomment the publish step above"
