appId: com.flightdeck.desktop
productName: Flightdeck
copyright: Copyright © 2026

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - assets/**/*
  - "!node_modules"

extraResources:
  - from: "../web/dist"
    to: "web"
  - from: "../server/dist"
    to: "server"
  - from: "../shared/dist"
    to: "shared"

mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  icon: assets/icon.png

win:
  target:
    - nsis
    - portable
  icon: assets/icon.png

linux:
  target:
    - AppImage
    - deb
  category: Development
  icon: assets/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
